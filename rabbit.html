<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>mY rABiiT</title>



















<style>
@font-face{
  font-family:'Bubble';
  src:url('BubbleShine.otf');}
body{
  margin:0;
  background:#BDA6CE;
  font-family:'Bubble', sans-serif;
}
.hero{
  width:100%;
  height:65vh;
  background:url('rab.jpg') center/cover no-repeat;}
.divider{
  width:100%;
  height:4px;
  background:#30494e;
}
.cards{
  display:flex;
  justify-content:center;
  gap:25px;
  padding:40px;
  flex-wrap:wrap;}
.card{
  width:220px;
  height:220px;
  background:#F2EAE0;
  border-radius:25px;
  border:3px solid #50737a; 
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  cursor:pointer;
  transition:0.4s;}
.card img{
  max-width:100%;
  max-height:65%;
  object-fit:contain; }
.card-text{
  color:#4f7077;
  font-size:2rem;
  text-align:center;}
.card:hover{
  transform:scale(1.07) translateY(-8px);
  box-shadow:
    0 0 20px rgba(255,255,255,0.6),
    0 0 40px rgba(15, 191, 226, 0.6);
    }
</style>
</head>


















<body>
<section class="hero"></section>
<div class="divider">
<div class="cards">
  <div class="card">
    <img src="r1.png">
    <div class="card-text">Health</div>
  </div>
  <div class="card">
    <img src="r2.png">
    <div class="card-text">Happiness</div>
  </div>
  <div class="card">
    <img src="r3.png">
    <div class="card-text">Basic Knowledge</div>
  </div>
  <div class="card">
    <img src="r4.png">
    <div class="card-text">Precautions</div>
  </div></div>





</body>
</html>
