<style>
@font-face{
  font-family:'Scriptin';
  src:url('SCRIPTIN.ttf');}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;}
body{
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}
.books-section{
  min-height:100vh;
  padding:80px 14%;
  background:
    linear-gradient(rgba(40,0,70,0.55), rgba(20,0,40,0.65)),
    url('purple.jpg');
  background-size:cover;
  background-position:center;
  text-align:center;
  position:relative;
  overflow:hidden;}
.books-section h2{
  font-family:'Scriptin', cursive;
  font-size:3.8rem;
  color:#957d9e;
  text-shadow:
    0 0 8px #100e11,
    0 0 18px #000000,
    0 0 30px #000000,
    0 0 45px rgba(55, 41, 65, 0.65); 
  margin-bottom:20px;
  position:relative;
  z-index:2;
}
.subtitle{
  color:#cf9df3;
  text-shadow:
    0 0 6px rgba(51, 13, 73, 0.6),
    0 0 12px rgba(74, 17, 109, 0.4);
}
.books-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:40px;
  max-width:1100px;
  margin:auto;
  position:relative;
  z-index:2;}
.book-card{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:24px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  transition:0.35s ease;}
.book-card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 15px 35px rgba(0,0,0,0.35);}
.book-card img{
  width:100%;
  height:380px;
  object-fit:contain;
  border-radius:16px;
  background:rgba(255,255,255,0.04);
}
.sparkle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#dba8ff;
  box-shadow:
    0 0 10px #dba8ff,
    0 0 20px #c86fff,
    0 0 30px #b84dff;
  animation:floatSparkle ease-in-out infinite;
  opacity:0.75;
}
.sparkle:nth-child(3n){width:5px;height:5px;}
.sparkle:nth-child(4n){width:10px;height:10px;}
.sparkle:nth-child(5n){width:6px;height:6px;}
