<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation</title>


<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">














<style>
@font-face{
  font-family:'Bubble';
  src:url('BubbleShine.otf');}
body{
  margin:0;
  padding:0;
  background:url('back2.jpg');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  height:100vh;
  overflow:hidden;
}
.bubble-box{
  position:absolute;
  bottom:230px;
  left:55%; 
  transform:translateX(-50%);
  width:260px;}
.bubble-img{
  width:100%;}
.bubble-text{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70%;
  text-align:center;
  color:#6a4c8f;
  font-size:1.1rem;
  font-family:'Allura', cursive;
  line-height:1.4;
  word-wrap:break-word;
}
.character{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:230px;
  animation: glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{
    filter: drop-shadow(0 0 10px rgba(255,141,225,0.6))
            drop-shadow(0 0 20px rgba(200,147,255,0.5));}
  50%{
    filter: drop-shadow(0 0 18px rgba(255,141,225,1))
            drop-shadow(0 0 35px rgba(200,147,255,0.9));
  }}
.hint-text{
  position:fixed; 
  top:15px;
  left:50%;
  transform:translateX(-50%);
  z-index:99999; 
  font-family:'Bubble', sans-serif;
  font-size:1.05rem;
  color:#ffffff;
  padding:8px 18px;
  border-radius:25px;
  background:rgba(40,0,70,0.6); 
  backdrop-filter:blur(8px);
  box-shadow:
    0 0 10px rgba(200,147,255,0.6),
    0 0 20px rgba(255,141,225,0.4);
  text-shadow:0 0 6px rgba(255,255,255,0.8);
  letter-spacing:1px;}
.fade{
  animation: fadeIn 0.4s ease;}
@keyframes fadeIn{
  from{ opacity:0; transform:translate(-50%,-40%);}
  to{ opacity:1; transform:translate(-50%,-50%);}}
@keyframes glowPulse{
  0%,100%{
    filter: drop-shadow(0 0 8px rgba(255,141,225,0.5))
            drop-shadow(0 0 18px rgba(200,147,255,0.4));}
  50%{
    filter: drop-shadow(0 0 20px rgba(255,141,225,0.9))
            drop-shadow(0 0 40px rgba(200,147,255,0.7));}}
</style>


















</head>
<body tabindex="0">
  <div class="hint-text">
  ⏎ Press Enter for next scene <!--literally got the backspace emoji from emojidb.org--></div>
<div class="bubble-box">
  <img src="talk.png" class="bubble-img">
 <div class="bubble-text" id="dialogue"></div></div>
<img src="talk1.png" class="character" id="character">













<script>
const dialogue = document.getElementById("dialogue");
const character = document.getElementById("character");
let index = 0;  
const dialogues = [
  "Wait... I never introduced myself. I am Sri. Since I was young, I was always drawn towards the medical stream and i wanted to be a doctor so bad.",
  "When i finally got to choose my stream, my mother denied paying for my medical education and at last i was forced to take non medical for engineering.",
  "In 11th grade i attendend the JEE exam coaching for half an year and finally gained courage to atleast message my brother telling him that i was never interested in JEE",
  "And i am glad i did.....he somehow convinced my mother and got me out of the coaching center....he also told me that i can still study for UCEED and NDA",
  "So now this is my last school year......15 or 16 years of my life i have spent in school ...its kind of sad too....WHat I fear? Losing friends",
  "Well they are kind of clingy and annoying so they are definetely not going away!!"];
const emotions = [
  "talk1.png",
  "talk2.png",
  "talk3.png",
  "talk4.png",
  "talk5.png",
  "talk6.png"];
dialogue.innerText = dialogues[index];
character.src = emotions[index];
window.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    index = (index + 1) % dialogues.length;
    dialogue.innerText = dialogues[index];
    character.src = emotions[index];
    dialogue.classList.remove("fade");
    void dialogue.offsetWidth;
    dialogue.classList.add("fade");
  }});
document.body.focus();
</script>





















</body>
</html>
